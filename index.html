<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PauloFlix</title>
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const initialTheme = savedTheme || (prefersDark ? 'dark' : 'light');

            if (initialTheme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <header>
            <div class="header-top">
                <a class="logo" href="./index.html" aria-label="PauloFlix">
                    <img src="./assets/logo.png" alt="PauloFlix">
                </a>
                <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Alternar tema claro e escuro">
                    <span class="theme-icon" aria-hidden="true"></span>
                </button>
            </div>
            <h2 id="profile-title">Quem está assistindo?</h2>
        </header>

        <section class="profiles" aria-labelledby="profile-title">
            <ul>
                <li>
                    <a class="profile" href="catalogo/catalogo.html" data-profile-name="Paulo"
                        data-profile-image="./assets/perfil-1.png">
                        <img src="./assets/perfil-1.png" alt="Avatar de um homem com barba, óculos e boné azul, vestindo camisa quadriculada e cardigã preto.">
                        <span>Paulo</span>
                    </a>
                </li>
                <li>
                    <a class="profile" href="catalogo/catalogo.html" data-profile-name="Michele"
                        data-profile-image="./assets/perfil-2.png">
                        <img src="./assets/perfil-2.png" alt="Avatar de uma mulher com cabelos cacheados castanhos, óculos e suéter amarelo com estampa de margarida.">
                        <span>Michele</span>
                    </a>
                </li>
                <li>
                    <a class="profile" href="catalogo/catalogo.html" data-profile-name="Infantil"
                        data-profile-image="./assets/infantil.png">
                        <img src="./assets/infantil.png" alt="Avatar de uma criança com óculos, toca azul e colete de tricô com bordado de trenzinho.">
                        <span>Infantil</span>
                    </a>
                </li>
                <li>
                    <a class="profile" href="catalogo/catalogo.html" data-add-profile="true">
                        <img src="./assets/add-profile.png" alt="Ícone circular cinza com um símbolo de adição (+) centralizado para criar um novo perfil.">
                        <span>Adicionar Perfil</span>
                    </a>
                </li>
            </ul>
        </section>
    </main>

    <script src="script.js"></script>
    <script src="profile-selection.js"></script>
</body>
</html>
